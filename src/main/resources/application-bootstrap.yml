spring:
  config:
    activate:
      on-profile: bootstrap

  datasource:
    username: ${GMDB_SUPERUSER}
    password: ${GMDB_SUPERUSER_PASSWORD}

  liquibase:
    change-log: classpath:db/changelog/bootstrap-changelog.xml
    parameters:
      gmdb.app.password: ${GMDB_APP_PASSWORD}
      gmdb.admin.password: ${GMDB_ADMIN_PASSWORD}
