name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**
      - feature/**
      - bugfix/**

permissions:
  contents: read

jobs:
  maven:
    name: Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Verify
        run: mvn -B verify
